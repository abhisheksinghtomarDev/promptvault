name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create Release ZIP
        run: |
          zip -r promptvault-${{ github.ref_name }}.zip \
            manifest.json \
            background.js \
            content.js \
            share.html \
            share.js \
            popup/ \
            icons/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: promptvault-*.zip
          generate_release_notes: true
