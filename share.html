<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Import Prompt - PromptVault</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      background: white;
      color: #333;
      padding: 40px;
      border-radius: 16px;
      text-align: center;
      width: min(400px, calc(100vw - 32px));
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { font-size: 24px; margin-bottom: 16px; color: #1e293b; }
    p { font-size: 14px; color: #64748b; margin-bottom: 24px; }
    .success { color: #10b981; font-weight: 500; }
    .error { color: #dc2626; }
    .btn {
      display: inline-block;
      background: #4F46E5;
      color: white;
      padding: 12px 24px;
      border-radius: 8px;
      border: 0;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }
    .btn:hover { background: #4338CA; }
    .btn.secondary {
      background: #e2e8f0;
      color: #1e293b;
    }
    .btn.secondary:hover { background: #cbd5e1; }
    .hidden { display: none !important; }
    .prompt-box {
      text-align: left;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      max-height: 300px;
      overflow: auto;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px;
      margin: 0 0 20px;
      color: #0f172a;
      font-size: 14px;
      line-height: 1.5;
    }
    .button-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #4F46E5;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div id="loading">
      <div class="spinner"></div>
      <h1>Importing Prompt...</h1>
      <p>Please wait while we save this prompt to your library.</p>
    </div>
    <div id="success" class="hidden">
      <h1 class="success">Prompt Imported!</h1>
      <p>The prompt has been saved to your local library.</p>
      <button type="button" class="btn close-btn">Close</button>
    </div>
    <div id="viewer" class="hidden">
      <h1 id="prompt-title">Shared Prompt</h1>
      <pre id="prompt-content" class="prompt-box"></pre>
      <div class="button-row">
        <button type="button" class="btn" id="copy-prompt-btn">Copy Prompt</button>
      </div>
    </div>
    <div id="error" class="hidden">
      <h1 class="error">Import Failed</h1>
      <p id="error-msg">The shared link appears to be invalid.</p>
      <button type="button" class="btn close-btn">Close</button>
    </div>
  </div>

  <script src="share.js"></script>
</body>
</html>
